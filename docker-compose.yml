version: "3.8"services:  payment-service:    build: ./SmartOrderPython    container_name: payment-service    ports:      - "50051:50051"    networks:      - smartorder-net    healthcheck:      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',50051))"]      interval: 10s      timeout: 5s      retries: 5  inventory-service:    build: ./inventory-service    container_name: inventory-service    ports:      - "8081:8081"      - "50052:50052"    networks:      - smartorder-net    environment:      - SPRING_PROFILES_ACTIVE=docker    healthcheck:      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]      interval: 10s      timeout: 5s      retries: 5  smartorder:    build: ./SmartOrder    container_name: smartorder    ports:      - "8080:8080"    depends_on:      payment-service:        condition: service_healthy      inventory-service:        condition: service_healthy    networks:      - smartorder-net    environment:      - SPRING_PROFILES_ACTIVE=dockernetworks:  smartorder-net:    driver: bridge